services:
  mariadb:
    image: 'bitnami/mariadb:latest'
    environment:
      - MARIADB_USER=bn_laravel
      - MARIADB_DATABASE=bitnami_laravel
      - MARIADB_PASSWORD=bitnami
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - 'mariadb_data:/bitnami/mariadb'

  laravel:
    image: 'php:8.3-fpm'
    working_dir: /app
    entrypoint: /app/docker-entrypoint.sh
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USERNAME=bn_laravel
      - DB_DATABASE=bitnami_laravel
      - DB_PASSWORD=bitnami
    volumes:
      - '.:/app'
    depends_on:
      - mariadb

  nginx:
    image: 'bitnami/nginx:latest'
    ports:
      - '8000:8080'
    volumes:
      - '.:/app'
      - './.docker/nginx/vhost.conf:/opt/bitnami/nginx/conf/server_blocks/laravel.conf:ro'
    depends_on:
      - laravel

volumes:
  mariadb_data:
    driver: local
